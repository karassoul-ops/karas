name: FM2026 자동댓글 일괄 삭제 (2026-06-24~25)

on:
  workflow_dispatch:

jobs:
  cleanup:
    name: 자동 댓글 삭제
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 자동 댓글 일괄 삭제
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, base64, json, os, time, sys

          EMAIL     = os.environ["JIRA_EMAIL"]
          TOKEN     = os.environ["JIRA_API_TOKEN"]
          SITE      = os.environ.get("JIRA_SITE", "optai.atlassian.net")
          BASE      = f"https://{SITE}/rest/api/3"
          AUTH      = "Basic " + base64.b64encode(f"{EMAIL}:{TOKEN}".encode()).decode()

          # 삭제 대상: 2026-06-24~25 작성된 PMO 자동알림 댓글
          TARGETS = {"FM2026-109": ["49608"], "FM2026-108": ["49609"], "FM2026-73": ["49573"], "FM2026-16": ["49964", "49965", "49966", "49967", "49968", "49969", "49970", "50025", "50026", "50027", "50075", "50076", "50077", "50078", "50079", "50080", "50081", "50082", "50083", "50084"], "FM2026-130": ["49665", "49785", "49786", "49787", "49788", "49789", "49790", "49791", "49792", "50148", "50149", "50150", "50151"], "FM2026-67": ["49582", "49911", "49912", "49913", "49914", "50130", "50131"], "FM2026-93": ["50013", "50014", "50015", "50016", "50098", "50099"], "FM2026-77": ["49941", "49942", "49943", "49944", "49945", "49946", "49947", "49948", "49949", "49950", "50085", "50086", "50087", "50088", "50089", "50090", "50091", "50092", "50093"], "FM2026-103": ["49997", "49998", "49999", "50000", "50106", "50107"], "FM2026-66": ["49703"], "FM2026-4": ["49478", "49489", "49519", "49613"], "FM2026-5": ["49422", "49466", "49481", "49614"], "FM2026-3": ["49480", "49673", "49674"], "FM2026-153": ["49637", "50179", "50180", "50181", "50182"], "FM2026-23": ["49730", "49731", "49732", "50178"], "FM2026-7": ["49728", "49729", "49733", "49734", "50177"], "FM2026-10": ["49726", "49727", "49735", "49736", "49737", "49738", "49739", "49740", "49741", "49742", "50173", "50174", "50175", "50176"], "FM2026-46": ["49716", "49743", "49744", "49745", "49746", "50171", "50172"], "FM2026-34": ["49701", "49702", "49747", "49748", "49749", "49750", "50169", "50170"], "FM2026-24": ["49700", "49751", "49752", "50168"], "FM2026-12": ["49754", "49755", "49756", "49757", "49758", "49759", "49760", "49761", "49762", "49763", "49764", "49765", "49766", "50161", "50162", "50163", "50164", "50165", "50166", "50167"], "FM2026-31": ["49695", "49696", "49697", "49767", "49768", "50160"], "FM2026-26": ["49677", "49678", "49769", "49770", "49771", "49772", "50158", "50159"], "FM2026-27": ["49675", "49676", "49773", "49774", "49775", "49776", "49777", "49778", "50155", "50156", "50157"], "FM2026-14": ["49671", "49672", "49779", "49780", "49781", "49782", "49783", "49784", "50152", "50153", "50154"], "FM2026-131": ["49663", "49664", "49793", "49794", "49795", "49796", "50146", "50147"], "FM2026-151": ["49638", "49797", "49798", "49799", "49800", "49801", "49802", "50143", "50144", "50145"], "FM2026-11": ["49804", "49805", "49806", "49807", "49808", "49809", "49810", "49811", "49812", "49813", "49814", "49815", "49816", "50136", "50137", "50138", "50139", "50140", "50141", "50142"], "FM2026-75": ["49590", "49591", "49903", "49904", "49905", "49906", "49907", "49908", "50133", "50134", "50135"], "FM2026-2": ["49580", "49581", "49915", "49916", "49917", "49918", "49919", "49920", "49921", "49922", "49923", "49924", "49925", "49926", "50124", "50125", "50126", "50127", "50128", "50129"], "FM2026-28": ["49551", "49576", "49577", "49927", "49928", "49929", "49930", "49931", "49932", "50121", "50122", "50123"], "FM2026-25": ["49568", "49569", "49971", "49972", "49973", "49974", "49975", "49976", "49977", "49978", "49979", "49980", "49981", "49982", "50115", "50116", "50117", "50118", "50119", "50120"], "FM2026-18": ["49567", "49983", "49984", "49985", "49986", "49987", "49988", "49989", "49990", "49991", "49992", "50110", "50111", "50112", "50113", "50114"], "FM2026-47": ["49565", "49566", "49993", "49994", "49995", "49996", "50108", "50109"], "FM2026-76": ["50001", "50002", "50003", "50004", "50104", "50105"], "FM2026-150": ["50005", "50006", "50007", "50008", "50102", "50103"], "FM2026-129": ["50009", "50010", "50011", "50012", "50100", "50101"], "FM2026-70": ["50017", "50018", "50019", "50020", "50096", "50097"], "FM2026-1": ["49414", "49415", "49464", "50021", "50022", "50023", "50024", "50094", "50095"], "FM2026-15": ["49898", "49899", "49900", "49901", "49902", "50028", "50061", "50062", "50063", "50064", "50065", "50066", "50067", "50068", "50069", "50070", "50071", "50072", "50073", "50074"], "FM2026-17": ["49866", "49867", "49868", "49869", "49870", "49871", "49872", "49873", "49874", "50029", "50051", "50052", "50053", "50054", "50055", "50056", "50057", "50058", "50059", "50060"], "FM2026-74": ["50031", "50032", "50033", "50034", "50035", "50036", "50037", "50038", "50039", "50040", "50041", "50042", "50043", "50044", "50045", "50046", "50047", "50048", "50049", "50050"], "FM2026-50": ["49724", "49725"], "FM2026-51": ["49722", "49723"], "FM2026-52": ["49720", "49721"], "FM2026-53": ["49718", "49719"], "FM2026-54": ["49717"], "FM2026-55": ["49715"], "FM2026-56": ["49714"]}

          total = sum(len(v) for v in TARGETS.values())
          deleted = 0
          failed  = 0

          print(f"삭제 대상: {total}개 댓글 / {len(TARGETS)}개 이슈")

          for issue_key, comment_ids in TARGETS.items():
              for cid in comment_ids:
                  url = f"{BASE}/issue/{issue_key}/comment/{cid}"
                  req = urllib.request.Request(
                      url, method="DELETE",
                      headers={"Authorization": AUTH, "Accept": "application/json"}
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=15) as resp:
                          deleted += 1
                          print(f"  삭제 완료: {issue_key}#{cid} (HTTP {resp.status})")
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          # 이미 삭제됨 — 정상 처리
                          deleted += 1
                          print(f"  이미 삭제: {issue_key}#{cid}")
                      else:
                          failed += 1
                          body = e.read().decode(errors="replace")[:200]
                          print(f"  삭제 실패: {issue_key}#{cid} HTTP {e.code}: {body}")
                  time.sleep(0.15)  # API rate limit 대응

          print(f"\n완료: 삭제={deleted}개, 실패={failed}개")
          if failed > 0:
              sys.exit(1)
          PYEOF
