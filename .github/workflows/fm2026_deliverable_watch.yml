name: FM2026 산출물 신규 등록 감시 (1시간 단위)

on:
  # 자동 스케줄은 fm2026_scheduler.yml 이 담당합니다.
  # 수동 실행
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: true
        default: "post-comments"
        type: choice
        options:
          - post-comments  # 실제 댓글 등록
          - review         # 검토 리포트만
          - dry-run        # 미리보기
      reset:
        description: "상태파일 초기화 (전체 산출물 재분석)"
        required: false
        default: false
        type: boolean

# 동시 실행 방지 (상태파일 경쟁 방지)
concurrency:
  group: fm2026-deliverable-watch
  cancel-in-progress: false

jobs:
  watch:
    name: 신규 산출물 감시·분석
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정 (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 상태파일을 실행 간 보존 (신규 감지의 핵심)
      - name: 산출물 추적 상태파일 복원
        uses: actions/cache@v4
        with:
          path: .fm2026_seen_attachments.json
          key: fm2026-seen-attachments-${{ github.run_id }}
          restore-keys: |
            fm2026-seen-attachments-

      - name: 산출물 감시 실행
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="--post-comments"
          else
            case "${{ github.event.inputs.mode }}" in
              post-comments) ARGS="--post-comments" ;;
              review)        ARGS="--review" ;;
              dry-run)       ARGS="" ;;
            esac
            [ "${{ github.event.inputs.reset }}" = "true" ] && ARGS="$ARGS --reset"
          fi
          python fm2026_deliverable_watch.py $ARGS

      - name: 산출물 추적 상태파일 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .fm2026_seen_attachments.json
          key: fm2026-seen-attachments-${{ github.run_id }}
