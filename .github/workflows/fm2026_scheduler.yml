name: FM2026 통합 자동 스케줄러

# ─────────────────────────────────────────────────────────────────────────────
# KST 09:00 / 13:30 / 17:00 (평일) 실행
# GitHub cron은 UTC 기준 → KST = UTC+9
#   09:00 KST = 00:00 UTC
#   13:30 KST = 04:30 UTC
#   17:00 KST = 08:00 UTC
# ─────────────────────────────────────────────────────────────────────────────
on:
  # 자동 스케줄 중지 (2026-06-25) — 재개 시 아래 주석 해제
  # schedule:
  #   - cron: "0 0 * * 1-5"    # 평일 09:00 KST (UTC 00:00)
  #   - cron: "30 4 * * 1-5"   # 평일 13:30 KST (UTC 04:30)
  #   - cron: "0 8 * * 1-5"    # 평일 17:00 KST (UTC 08:00)
  # push:
  #   branches: [main]
  workflow_dispatch:           # 수동 실행만 허용
    inputs:
      mode:
        description: "실행 모드"
        required: true
        default: "full"
        type: choice
        options:
          - full          # 전체 실행 (PMO + 감시 + 산출물 분석)
          - pmo-only      # PMO 댓글만
          - watch-only    # 감시(스마트+산출물)만
          - gap-all       # 모든 이슈 갭분석 (산출물 변동 없어도)
          - dry-run       # 미리보기 (댓글 미등록)
      reset_state:
        description: "상태파일 초기화 (전체 재분석)"
        required: false
        default: false
        type: boolean
      issue_key:
        description: "특정 이슈만 처리 (예: FM2026-153, 비워두면 전체)"
        required: false
        default: ""

concurrency:
  group: fm2026-scheduler
  cancel-in-progress: false

jobs:
  run:
    name: FM2026 통합 자동화 실행
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정 (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 시각 기반 실행 여부 결정 ──────────────────────────────────────────
      - name: 실행 대상 결정 (KST 시각 판단)
        id: decide
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          python3 << 'PYEOF'
          import datetime, os

          kst  = datetime.timezone(datetime.timedelta(hours=9))
          now  = datetime.datetime.now(kst)
          h, m, wd = now.hour, now.minute, now.isoweekday()

          event     = os.environ.get('GITHUB_EVENT_NAME', 'schedule')
          inp_mode  = os.environ.get('INPUT_MODE', '')
          force     = event in ('workflow_dispatch', 'push')

          # 수동 실행 모드 처리
          if inp_mode in ('dry-run',):
              run_pmo   = False
              run_watch = False
              run_dry   = True
              run_gap   = False
          elif inp_mode == 'pmo-only':
              run_pmo   = True
              run_watch = False
              run_dry   = False
              run_gap   = False
          elif inp_mode == 'watch-only':
              run_pmo   = False
              run_watch = True
              run_dry   = False
              run_gap   = False
          elif inp_mode == 'gap-all':
              run_pmo   = False
              run_watch = True
              run_dry   = False
              run_gap   = True
          else:
              # full 또는 스케줄/push 실행
              run_watch = True
              run_pmo   = force or (wd <= 5 and h in (9, 13, 17))
              run_dry   = False
              run_gap   = False

          print(f"KST {now:%Y-%m-%d %H:%M} 요일={wd} 이벤트={event} 모드={inp_mode or 'auto'}")
          print(f"  → PMO={run_pmo}  감시={run_watch}  갭분석={run_gap}  dry={run_dry}")

          gho = os.environ['GITHUB_OUTPUT']
          with open(gho, 'a') as f:
              f.write(f"run_pmo={'true' if run_pmo else 'false'}\n")
              f.write(f"run_watch={'true' if run_watch else 'false'}\n")
              f.write(f"run_gap={'true' if run_gap else 'false'}\n")
              f.write(f"run_dry={'true' if run_dry else 'false'}\n")
          PYEOF

      # ── 감시 상태파일 복원 ───────────────────────────────────────────────
      - name: 감시 상태파일 복원
        uses: actions/cache@v4
        with:
          path: |
            .fm2026_watch_state.json
            .fm2026_seen_attachments.json
          key: fm2026-watch-state-${{ github.run_id }}
          restore-keys: |
            fm2026-watch-state-

      # ── 스마트 적응형 감시 ───────────────────────────────────────────────
      - name: 스마트 감시 실행
        if: steps.decide.outputs.run_watch == 'true'
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          ARGS="--post-comments"
          [ "${{ github.event.inputs.reset_state }}" = "true" ] && ARGS="$ARGS --reset"
          [ -n "${{ github.event.inputs.issue_key }}" ] && ARGS="$ARGS --issue ${{ github.event.inputs.issue_key }}"
          python fm2026_smart_watch.py $ARGS

      # ── 산출물 신규·갱신 감지 + 주요산출물 기준 갭분석 댓글 ─────────────
      - name: 산출물 감시 및 정밀분석 실행
        if: steps.decide.outputs.run_watch == 'true'
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          ARGS="--post-comments"
          [ "${{ github.event.inputs.reset_state }}" = "true" ] && ARGS="$ARGS --reset"
          [ "${{ steps.decide.outputs.run_gap }}" = "true" ]    && ARGS="$ARGS --gap-all"
          [ -n "${{ github.event.inputs.issue_key }}" ] && ARGS="$ARGS --issue ${{ github.event.inputs.issue_key }}"
          python fm2026_deliverable_watch.py $ARGS

      # ── dry-run 미리보기 ────────────────────────────────────────────────
      - name: 산출물 감시 dry-run 미리보기
        if: steps.decide.outputs.run_dry == 'true'
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          python fm2026_deliverable_watch.py --review
          python fm2026_pmo_auto.py --review

      # ── PMO 자동화 (평일 09:00 / 13:30 / 17:00 KST) ────────────────────
      - name: 사업 현황 대시보드 출력
        if: steps.decide.outputs.run_pmo == 'true'
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          ARGS="--dashboard"
          [ -n "${{ github.event.inputs.issue_key }}" ] && ARGS="$ARGS --issue ${{ github.event.inputs.issue_key }}"
          python fm2026_pmo_auto.py $ARGS

      - name: PMO 자동화 실행 (댓글 등록)
        if: steps.decide.outputs.run_pmo == 'true'
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          ARGS="--post-comments"
          [ -n "${{ github.event.inputs.issue_key }}" ] && ARGS="$ARGS --issue ${{ github.event.inputs.issue_key }}"
          python fm2026_pmo_auto.py $ARGS

      # ── 감시 상태파일 저장 ───────────────────────────────────────────────
      - name: 감시 상태파일 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .fm2026_watch_state.json
            .fm2026_seen_attachments.json
          key: fm2026-watch-state-${{ github.run_id }}

      # ── 로그 아티팩트 저장 ───────────────────────────────────────────────
      - name: 로그 아티팩트 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fm2026-scheduler-${{ github.run_id }}
          path: |
            fm2026_pmo_report_*.json
            fm2026_pmo_auto.log
            fm2026_smart_watch.log
            fm2026_deliverable_watch.log
          retention-days: 30
          if-no-files-found: ignore
