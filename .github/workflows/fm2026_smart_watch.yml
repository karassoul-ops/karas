name: FM2026 스마트 적응형 감시 (수동)

on:
  # 자동 스케줄은 fm2026_scheduler.yml 이 담당합니다.
  workflow_dispatch:
    inputs:
      mode:
        description: "실행 모드"
        required: true
        default: "post-comments"
        type: choice
        options:
          - post-comments
          - review
          - dry-run
      reset:
        description: "상태 초기화 (전체 재분석)"
        required: false
        default: false
        type: boolean

concurrency:
  group: fm2026-smart-watch
  cancel-in-progress: false

jobs:
  smart-watch:
    name: 스마트 적응형 감시 1회 점검
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 감시 상태파일 복원
        uses: actions/cache@v4
        with:
          path: |
            .fm2026_watch_state.json
            .fm2026_seen_attachments.json
          key: fm2026-watch-state-${{ github.run_id }}
          restore-keys: |
            fm2026-watch-state-

      - name: 스마트 감시 실행
        env:
          JIRA_EMAIL:     ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_SITE:      ${{ secrets.JIRA_SITE || 'optai.atlassian.net' }}
        run: |
          case "${{ github.event.inputs.mode }}" in
            post-comments) ARGS="--post-comments" ;;
            review)        ARGS="--review" ;;
            *)             ARGS="" ;;
          esac
          [ "${{ github.event.inputs.reset }}" = "true" ] && ARGS="$ARGS --reset"
          python fm2026_smart_watch.py $ARGS

      - name: 감시 상태파일 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .fm2026_watch_state.json
            .fm2026_seen_attachments.json
          key: fm2026-watch-state-${{ github.run_id }}
